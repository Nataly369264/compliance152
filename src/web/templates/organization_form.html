{% extends "base.html" %}
{% block title %}Новая организация — Compliance 152-ФЗ{% endblock %}
{% block content %}

<h1>Добавить организацию</h1>

<div id="error-box" class="alert alert-error" hidden></div>

<form id="org-form" class="card" style="max-width:800px">

    <div class="form-section">
        <h3>Основные данные</h3>
        <div class="form-row">
            <div class="form-group">
                <label for="legal_name">Полное наименование *</label>
                <input type="text" id="legal_name" required placeholder='ООО "Ромашка"'>
            </div>
            <div class="form-group">
                <label for="short_name">Сокращённое</label>
                <input type="text" id="short_name" placeholder="Ромашка">
            </div>
        </div>
        <div class="form-group">
            <label for="website_url">Сайт *</label>
            <input type="url" id="website_url" required placeholder="https://example.com">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="inn">ИНН</label>
                <input type="text" id="inn" placeholder="1234567890">
            </div>
            <div class="form-group">
                <label for="ogrn">ОГРН</label>
                <input type="text" id="ogrn" placeholder="1234567890123">
            </div>
        </div>
    </div>

    <div class="form-section">
        <h3>Адреса</h3>
        <div class="form-group">
            <label for="legal_address">Юридический адрес</label>
            <input type="text" id="legal_address" placeholder="г. Москва, ул. Примерная, д. 1">
        </div>
        <div class="form-group">
            <label for="actual_address">Фактический адрес</label>
            <input type="text" id="actual_address" placeholder="г. Москва, ул. Примерная, д. 1">
        </div>
    </div>

    <div class="form-section">
        <h3>Руководство</h3>
        <div class="form-row">
            <div class="form-group">
                <label for="ceo_name">ФИО руководителя</label>
                <input type="text" id="ceo_name" placeholder="Иванов Иван Иванович">
            </div>
            <div class="form-group">
                <label for="ceo_position">Должность</label>
                <input type="text" id="ceo_position" value="Генеральный директор">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="responsible_person">Ответственный за ПДн</label>
                <input type="text" id="responsible_person" placeholder="Петров Пётр Петрович">
            </div>
            <div class="form-group">
                <label for="responsible_contact">Контакт ответственного</label>
                <input type="text" id="responsible_contact" placeholder="petrov@example.com">
            </div>
        </div>
    </div>

    <div class="form-section">
        <h3>Контакты</h3>
        <div class="form-row">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="info@example.com">
            </div>
            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" placeholder="+7 (999) 123-45-67">
            </div>
        </div>
    </div>

    <div class="form-section">
        <h3>Обработка персональных данных</h3>

        <div class="form-group">
            <label>Категории персональных данных</label>
            <div class="tag-input-wrap">
                <input type="text" id="data_categories_input" placeholder="Например: ФИО, email, телефон">
                <button type="button" id="data_categories_add" class="btn">+</button>
            </div>
            <div class="tags" id="data_categories_tags"></div>
        </div>

        <div class="form-group">
            <label>Цели обработки</label>
            <div class="tag-input-wrap">
                <input type="text" id="processing_purposes_input" placeholder="Например: Исполнение договора">
                <button type="button" id="processing_purposes_add" class="btn">+</button>
            </div>
            <div class="tags" id="processing_purposes_tags"></div>
        </div>

        <div class="form-group">
            <label>Категории субъектов</label>
            <div class="tag-input-wrap">
                <input type="text" id="data_subjects_input" placeholder="Например: Клиенты, сотрудники">
                <button type="button" id="data_subjects_add" class="btn">+</button>
            </div>
            <div class="tags" id="data_subjects_tags"></div>
        </div>

        <div class="form-group">
            <label>Третьи лица (получатели ПДн)</label>
            <div class="tag-input-wrap">
                <input type="text" id="third_parties_input" placeholder="Например: Яндекс.Метрика">
                <button type="button" id="third_parties_add" class="btn">+</button>
            </div>
            <div class="tags" id="third_parties_tags"></div>
        </div>
    </div>

    <div class="form-section">
        <h3>Дополнительно</h3>

        <div class="form-group">
            <label>
                <input type="checkbox" id="cross_border">
                Трансграничная передача данных
            </label>
        </div>

        <div class="form-group">
            <label>Страны трансграничной передачи</label>
            <div class="tag-input-wrap">
                <input type="text" id="cross_border_countries_input" placeholder="Например: Казахстан">
                <button type="button" id="cross_border_countries_add" class="btn">+</button>
            </div>
            <div class="tags" id="cross_border_countries_tags"></div>
        </div>

        <div class="form-group">
            <label for="hosting_location">Место хранения данных</label>
            <input type="text" id="hosting_location" value="Российская Федерация">
        </div>

        <div class="form-group">
            <label>Информационные системы</label>
            <div class="tag-input-wrap">
                <input type="text" id="info_systems_input" placeholder="Например: 1С, CRM, Сайт">
                <button type="button" id="info_systems_add" class="btn">+</button>
            </div>
            <div class="tags" id="info_systems_tags"></div>
        </div>
    </div>

    <button type="submit" class="btn btn-primary btn-lg">Сохранить организацию</button>
</form>

{% endblock %}
